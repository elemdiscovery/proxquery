# Gate 2: manual promotion of a published release to GHCR.
#
# Takes a release tag and builds + pushes Docker images (PG 16/17/18, amd64 +
# arm64) to GHCR. This is deliberately manual: a human promotes a release once
# it's proven.
#
# Images pushed (multi-arch manifests):
#   ghcr.io/elemdiscovery/proxquery:<version>-pg<NN>   immutable, per release
#   ghcr.io/elemdiscovery/proxquery:pg<NN>             rolling latest for that major
#   ghcr.io/elemdiscovery/proxquery:latest             -> pg17 (when push_latest)
name: promote

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag to promote (e.g. v0.2.0)"
        required: true
        type: string
      push_latest:
        description: "Move the rolling :pg<NN> and :latest tags"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # Build the extension into a Postgres image per (major, arch) on native
  # runners, pushing an arch-suffixed tag that the manifest job stitches together.
  image:
    name: image pg${{ matrix.pg }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.version_tag }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build, smoke-test, then push (arch-suffixed)
        run: |
          set -euo pipefail
          VER="${{ inputs.version_tag }}"; VER="${VER#v}"
          TAG="${IMAGE}:${VER}-pg${{ matrix.pg }}-${{ matrix.arch }}"
          docker build --build-arg PG_MAJOR=${{ matrix.pg }} -t "$TAG" .
          packaging/smoke.sh "$TAG"   # gate: a broken image never gets pushed
          docker push "$TAG"

  # Combine the per-arch images into multi-arch manifests and move rolling tags.
  manifest:
    name: manifest pg${{ matrix.pg }}
    needs: image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg: [16, 17, 18]
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create manifests
        run: |
          set -euo pipefail
          VER="${{ inputs.version_tag }}"; VER="${VER#v}"
          BASE="${IMAGE}:${VER}-pg${{ matrix.pg }}"

          # Immutable per-release multi-arch tag.
          docker buildx imagetools create -t "$BASE" "${BASE}-amd64" "${BASE}-arm64"

          if [ "${{ inputs.push_latest }}" = "true" ]; then
            # Rolling per-major tag.
            docker buildx imagetools create -t "${IMAGE}:pg${{ matrix.pg }}" "$BASE"
            # :latest tracks pg17.
            if [ "${{ matrix.pg }}" = "17" ]; then
              docker buildx imagetools create -t "${IMAGE}:latest" "$BASE"
            fi
          fi
