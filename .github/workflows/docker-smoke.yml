# Smoke-tests the Docker build path that the rest of CI doesn't cover.
#
# test.yml compiles against pgrx's own downloaded Postgres; this builds the
# Dockerfile (extension compiled against the PGDG server-dev package, loaded into
# the official postgres:<major> image) and confirms it actually boots and runs
# `CREATE EXTENSION`. Catches compile/ABI/glibc breaks in the image before they
# reach a release. Path-filtered so it only runs when something relevant changes.
name: docker-smoke

on:
  push:
    branches: [main]
    paths: &paths
      - Dockerfile
      - "src/**"
      - "sql/**"
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/docker-smoke.yml
  pull_request:
    paths: *paths
  workflow_dispatch:

concurrency:
  group: docker-smoke-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN: this workflow only checks out and
# builds, so read access to repo contents is all it needs.
permissions:
  contents: read

jobs:
  smoke:
    name: docker pg${{ matrix.pg }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Layer-cache the build via the GitHub Actions cache. Scoped per PG major
      # so the parallel matrix legs don't clobber each other's cache. On a repeat
      # run with an unchanged Dockerfile the apt + cargo-pgrx layers are restored
      # instead of rebuilt; `load: true` puts the image in the local daemon so
      # the smoke step below can run it.
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: proxquery:smoke-${{ matrix.pg }}
          build-args: PG_MAJOR=${{ matrix.pg }}
          cache-from: type=gha,scope=docker-smoke-pg${{ matrix.pg }}
          cache-to: type=gha,mode=max,scope=docker-smoke-pg${{ matrix.pg }}

      - name: Boot and CREATE EXTENSION
        run: packaging/smoke.sh proxquery:smoke-${{ matrix.pg }}
