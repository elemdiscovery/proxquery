# Builds the distributable binaries and attaches them to a GitHub Release.
#
# Reused two ways:
#   * called by release.yml in the same run as a release (the normal path);
#   * run manually (workflow_dispatch) to rebuild a release's assets — pick the
#     release tag as the workflow ref in the Actions UI.
#
# Deliberately NOT triggered by `push: tags`: release.yml already invokes this as
# a `needs:` job in the same run, so a tag trigger would double-build whenever
# release-plz runs with a PAT (its tag push would fire this too).
#
# Each matrix leg produces one relocatable tarball (the .so + .control +
# versioned .sql + install.sh) plus a .sha256, uploaded as a workflow artifact;
# the publish job attaches them all to the Release for the current version.
#
# NOTE on portability: legs build on GitHub's Ubuntu runners, so the .so is
# linked against that runner's glibc and will load on equal-or-newer glibc only.
# For older distros, build against PGDG in a container, or use the Docker image.
name: release-build

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  # Keep cargo-pgrx in lockstep with the pgrx crate dependency in Cargo.toml.
  PGRX_VERSION: 0.19.1

jobs:
  build:
    name: pg${{ matrix.pg }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm   # GitHub-hosted arm64 (free for public repos)

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Build deps for compiling PostgreSQL from source (cargo pgrx init download).
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex libreadline-dev zlib1g-dev \
            libssl-dev libxml2-dev libxslt1-dev xsltproc ccache pkg-config

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo + pgrx build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-pg${{ matrix.pg }}-${{ matrix.arch }}

      # Reuse (and share with test.yml) the pgrx-built PostgreSQL: a cache hit
      # skips the ~10-min source build. Keyed on OS + arch + PG + pgrx version.
      - name: Cache the pgrx-built PostgreSQL (~/.pgrx)
        id: pgrx-pg
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-${{ runner.arch }}-pg${{ matrix.pg }}-${{ env.PGRX_VERSION }}

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx@${PGRX_VERSION}

      - name: Initialize pgrx (pg${{ matrix.pg }})
        if: steps.pgrx-pg.outputs.cache-hit != 'true'
        run: cargo pgrx init --pg${{ matrix.pg }} download

      - name: Package the extension
        id: pkg
        run: |
          set -euo pipefail
          PGCONFIG="$(sed -n "s/^pg${{ matrix.pg }} = \"\(.*\)\"/\1/p" ~/.pgrx/config.toml)"
          cargo pgrx package --no-default-features --features pg${{ matrix.pg }} --pg-config "$PGCONFIG"

          # Collect the three install artifacts wherever pgrx laid them in the
          # package tree, and derive the version from the SQL file pgrx named.
          SO="$(find target -name 'proxquery.so' -path '*release*' | head -1)"
          CONTROL="$(find target -name 'proxquery.control' -path '*release*' | head -1)"
          SQL="$(find target -name 'proxquery--*.sql' -path '*release*' | head -1)"
          VERSION="$(basename "$SQL" | sed -E 's/^proxquery--(.*)\.sql$/\1/')"

          STAGE="proxquery-${VERSION}-pg${{ matrix.pg }}-linux-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          cp "$SO" "$CONTROL" "$SQL" packaging/install.sh "$STAGE/"
          chmod +x "$STAGE/install.sh"
          cat > "$STAGE/README.txt" <<EOF
          proxquery ${VERSION} — PostgreSQL ${{ matrix.pg }} (linux/${{ matrix.arch }})

          Install into the Postgres on your PATH:
              ./install.sh                 # uses pg_config from PATH
              PG_CONFIG=/path/to/pg_config ./install.sh

          Then, in the target database:
              CREATE EXTENSION proxquery;

          Built against glibc from the CI runner; requires equal-or-newer glibc.
          EOF

          mkdir -p dist
          tar -czf "dist/${STAGE}.tar.gz" "$STAGE"
          ( cd dist && sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256" )
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.pkg.outputs.stage }}
          path: dist/*
          if-no-files-found: error

  # Gather every leg's tarball and attach them to the Release for this version.
  publish:
    name: attach to release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          TAG="v${VERSION}"
          # release-plz normally created the Release already; create it for the
          # standalone tag-push / manual paths if it's missing. `|| true` swallows
          # a harmless race if two steps ever create concurrently.
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Automated release." || true
          gh release upload "$TAG" dist/* --clobber
