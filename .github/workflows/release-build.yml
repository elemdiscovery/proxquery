# Builds a release's artifacts: the GHCR container images AND the relocatable
# install tarballs, from a SINGLE compile per (PG major, arch).
#
# Reused two ways:
#   * called by release.yml in the same run as a release (the normal path);
#   * run manually (workflow_dispatch) to rebuild/re-push a release's artifacts —
#     pick the release tag as the workflow ref in the Actions UI.
#
# Each matrix leg builds the Dockerfile once on a native runner (no emulation),
# smoke-tests the image, pushes it arch-suffixed to GHCR, then lifts the install
# tarball out of the SAME build's `export` stage (served from the layer cache, so
# no second compile). Follow-on jobs stitch the per-arch images into multi-arch
# manifests and attach the tarballs to the GitHub Release.
#
# Images pushed (multi-arch manifests):
#   ghcr.io/elemdiscovery/proxquery:<version>-pg<NN>   immutable, per release
#   ghcr.io/elemdiscovery/proxquery:pg<NN>             rolling latest for that major
#   ghcr.io/elemdiscovery/proxquery:latest             -> pg17 (when push_latest)

name: release-build

on:
  workflow_call:
    inputs:
      push_latest:
        description: "Move the rolling :pg<NN> and :latest tags"
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Move the rolling :pg<NN> and :latest tags"
        required: false
        type: boolean
        default: true

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # publish job attaches tarballs to the Release
  packages: write   # build/manifest jobs push images to GHCR

env:
  IMAGE: ghcr.io/${{ github.repository }}
  # build-push-action (v6+) otherwise uploads a `.dockerbuild` build record as a
  # workflow artifact per invocation; the publish job's download-artifact would
  # sweep those into the Release. We don't need the records, so don't upload them.
  DOCKER_BUILD_RECORD_UPLOAD: "false"

jobs:
  build:
    name: pg${{ matrix.pg }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    # Least privilege for the build leg: read source, push the image, and write a
    # provenance attestation. (The publish job keeps the workflow-level
    # `contents: write` it needs to attach assets to the Release.)
    permissions:
      contents: read
      packages: write          # push the arch-suffixed image to GHCR
      id-token: write          # OIDC identity for keyless Sigstore signing
      attestations: write      # persist the attestation
      artifact-metadata: write # create the artifact storage record
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm   # GitHub-hosted arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Resolve version
        id: ver
        run: echo "version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      # Build the runtime image and load it locally so the smoke test can boot it
      # before we push. The GHA layer cache (scoped per pg+arch) restores the apt +
      # cargo-pgrx layers across runs; only the source compile re-runs.
      - name: Build the image (load locally for the smoke test)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}-pg${{ matrix.pg }}-${{ matrix.arch }}
          build-args: PG_MAJOR=${{ matrix.pg }}
          cache-from: type=gha,scope=release-pg${{ matrix.pg }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-pg${{ matrix.pg }}-${{ matrix.arch }}

      - name: Smoke-test, then push (arch-suffixed)
        run: |
          set -euo pipefail
          TAG="${IMAGE}:${{ steps.ver.outputs.version }}-pg${{ matrix.pg }}-${{ matrix.arch }}"
          packaging/smoke.sh "$TAG"   # gate: a broken image never gets pushed
          docker push "$TAG"

      # Lift the install artifacts out of the SAME build's `export` stage. Served
      # from the cache the image build just populated, so this is no second compile.
      - name: Extract the install tarball
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: export
          build-args: PG_MAJOR=${{ matrix.pg }}
          outputs: type=local,dest=out
          cache-from: type=gha,scope=release-pg${{ matrix.pg }}-${{ matrix.arch }}

      - name: Package the tarball
        id: pkg
        run: |
          set -euo pipefail
          # The export stage drops the three install artifacts at ./out; derive
          # the version from the SQL file pgrx named.
          SO="out/proxquery.so"
          CONTROL="out/proxquery.control"
          SQL="$(find out -name 'proxquery--*.sql' | head -1)"
          VERSION="$(basename "$SQL" | sed -E 's/^proxquery--(.*)\.sql$/\1/')"

          STAGE="proxquery-${VERSION}-pg${{ matrix.pg }}-linux-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          cp "$SO" "$CONTROL" "$SQL" packaging/install.sh "$STAGE/"
          chmod +x "$STAGE/install.sh"
          cat > "$STAGE/README.txt" <<EOF
          proxquery ${VERSION} — PostgreSQL ${{ matrix.pg }} (linux/${{ matrix.arch }})

          Install into the Postgres on your PATH:
              ./install.sh                 # uses pg_config from PATH
              PG_CONFIG=/path/to/pg_config ./install.sh

          Then, in the target database:
              CREATE EXTENSION proxquery;

          Built against Debian bookworm (glibc 2.36); requires equal-or-newer glibc.
          EOF

          mkdir -p dist
          tar -czf "dist/${STAGE}.tar.gz" "$STAGE"
          ( cd dist && sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256" )
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

      # Sign the tarball with a keyless Sigstore build-provenance attestation,
      # bound to this workflow's OIDC identity (no stored key to manage). Anyone
      # can later confirm a download was built by this repo's CI with:
      #   gh attestation verify <tarball> --repo elemdiscovery/proxquery
      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          # No predicate or SBOM inputs, so actions/attest defaults to SLSA build provenance.
          subject-path: dist/*.tar.gz

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.pkg.outputs.stage }}
          path: dist/*
          if-no-files-found: error

  # Combine the per-arch images into multi-arch manifests and move rolling tags.
  manifest:
    name: manifest pg${{ matrix.pg }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        pg: [16, 17, 18]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create manifests
        run: |
          set -euo pipefail
          VER="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          BASE="${IMAGE}:${VER}-pg${{ matrix.pg }}"

          # Immutable per-release multi-arch tag.
          docker buildx imagetools create -t "$BASE" "${BASE}-amd64" "${BASE}-arm64"

          if [ "${{ inputs.push_latest }}" = "true" ]; then
            # Rolling per-major tag.
            docker buildx imagetools create -t "${IMAGE}:pg${{ matrix.pg }}" "$BASE"
            # :latest tracks pg17.
            if [ "${{ matrix.pg }}" = "17" ]; then
              docker buildx imagetools create -t "${IMAGE}:latest" "$BASE"
            fi
          fi

  # Gather every leg's tarball and attach them to the Release for this version.
  publish:
    name: attach to release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          # Only the tarball artifacts (named proxquery-…) — never any stray
          # workflow artifact, so the Release can't be polluted.
          pattern: 'proxquery-*'
          merge-multiple: true

      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          # release.yml's gate creates the Release (with the CHANGELOG as notes);
          # this job only attaches the built tarballs. When run manually to
          # rebuild assets, pick the release's tag as the ref — the Release must
          # already exist.
          gh release upload "$TAG" dist/* --clobber
