name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:   # allow running the benchmark on demand

# Cancel superseded runs on the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (pg${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]

    env:
      # Keep cargo-pgrx in lockstep with the pgrx crate dependency in Cargo.toml.
      PGRX_VERSION: 0.19.1

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Build deps for compiling PostgreSQL from source (cargo pgrx init ... download).
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex libreadline-dev zlib1g-dev \
            libssl-dev libxml2-dev libxslt1-dev xsltproc ccache pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo + pgrx build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: pg${{ matrix.pg }}

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx@${PGRX_VERSION}

      # `cargo pgrx init ... download` compiles PostgreSQL from source (~10 min).
      # Cache the built install so a hit skips it entirely (seconds vs minutes).
      # Keyed on the PG + pgrx versions, so it rebuilds only when those change.
      - name: Cache the pgrx-built PostgreSQL (~/.pgrx)
        id: pgrx-pg
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-${{ runner.arch }}-pg${{ matrix.pg }}-${{ env.PGRX_VERSION }}

      - name: Initialize pgrx (pg${{ matrix.pg }})
        if: steps.pgrx-pg.outputs.cache-hit != 'true'
        run: cargo pgrx init --pg${{ matrix.pg }} download

      - name: Clippy
        run: cargo clippy --no-default-features --features pg${{ matrix.pg }} --all-targets -- -D warnings

      - name: Run tests
        run: cargo pgrx test --no-default-features --features pg${{ matrix.pg }} pg${{ matrix.pg }}

  # Benchmark the pure-SQL port against the native extension on the default
  # Postgres version only. The timings on a shared runner are noise; the job's
  # real gate is the parity check baked into the benchmark (the pure port and
  # the extension must select identical rows, or it fails). The Markdown report
  # is uploaded as an artifact for eyeballing (and future tracking).
  bench:
    name: benchmark (pg17)
    runs-on: ubuntu-latest
    # On a PR this posts/updates a sticky benchmark comment; on main pushes and
    # manual runs it just uploads the report artifact. Parity is also gated
    # independently on every PR by the matrix job's pure_sql_port_matches_extension
    # test. The benchmark needs a full Postgres build and its timings are runner-
    # noise, so read the comment as a smoke + parity check, not a perf baseline.
    permissions:
      contents: read
      pull-requests: write     # post / update the PR comment
    env:
      PGRX_VERSION: 0.19.1
      # Propagated to the shell, read by bench/report.sh. A small corpus and few
      # iterations — CI just needs correctness + a smoke run, not stable timings.
      NDOCS: 10000
      ITERS: 3

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex libreadline-dev zlib1g-dev \
            libssl-dev libxml2-dev libxslt1-dev xsltproc ccache pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo + pgrx build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: bench-pg17

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx@${PGRX_VERSION}

      # Shares the pg17 key with the matrix job, so the compiled PostgreSQL is
      # built once and reused here (and across runs). See the matrix job note.
      - name: Cache the pgrx-built PostgreSQL (~/.pgrx)
        id: pgrx-pg
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-${{ runner.arch }}-pg17-${{ env.PGRX_VERSION }}

      - name: Initialize pgrx (pg17)
        if: steps.pgrx-pg.outputs.cache-hit != 'true'
        run: cargo pgrx init --pg17 download

      - name: Install extension into the managed instance
        run: |
          cargo pgrx install --no-default-features --features pg17 \
            --pg-config "$(sed -n 's/^pg17 = "\(.*\)"/\1/p' ~/.pgrx/config.toml)"

      - name: Start the managed instance
        run: cargo pgrx start pg17

      - name: Benchmark + report (parity-gated)
        id: bench
        run: |
          PGCONFIG="$(sed -n 's/^pg17 = "\(.*\)"/\1/p' ~/.pgrx/config.toml)"
          export PATH="$(dirname "$PGCONFIG"):$PATH"
          export PGHOST="$HOME/.pgrx" PGPORT=28817   # pgrx default: 28800 + major
          bash bench/report.sh
          echo "report=$(ls -t bench/reports/*.md | head -1)" >> "$GITHUB_OUTPUT"

      # Sticky comment: a fixed header lets re-runs on the same PR edit the same
      # comment in place instead of stacking new ones. Skipped for fork PRs,
      # whose read-only token can't comment.
      - name: Post / update benchmark comment on the PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: benchmark-pg17
          path: ${{ steps.bench.outputs.report }}

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-report-pg17
          path: bench/reports/*.md
          if-no-files-found: ignore

      # The bench starts the managed instance; stop it so the ~/.pgrx cache is
      # saved with a clean (not-running) data directory.
      - name: Stop the managed instance
        if: always()
        run: cargo pgrx stop pg17 || true
