# Builds and publishes the rolling `edge` pre-release: the "latest main" build.
#
# Called by release.yml for every non-release commit (it decides when, so there's
# no skip-guard here), or run manually via workflow_dispatch. Builds a subset of
# the matrix (PG 17, amd64 + arm64), versions the artifacts <base>-dev.<n>.g<sha>
# off the current Cargo.toml version, and republishes a single `edge` GitHub
# pre-release pointing at the current commit. Edge is FRESH-INSTALL ONLY — no
# `ALTER EXTENSION ... UPDATE` path is implied. Not for production.
name: edge-build

on:
  workflow_call:
  workflow_dispatch:

# A newer edge build supersedes an in-flight one. Static group so it dedupes
# across the parent runs that call this workflow. Never groups with release
# builds, so it can't cancel a release.
concurrency:
  group: edge
  cancel-in-progress: true

permissions:
  contents: write

env:
  PGRX_VERSION: 0.19.1

jobs:
  build:
    name: edge pg17 ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need full history for the commit count in the version

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex libreadline-dev zlib1g-dev \
            libssl-dev libxml2-dev libxslt1-dev xsltproc ccache pkg-config

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo + pgrx build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: edge-pg17-${{ matrix.arch }}

      - name: Cache the pgrx-built PostgreSQL (~/.pgrx)
        id: pgrx-pg
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-${{ runner.arch }}-pg17-${{ env.PGRX_VERSION }}

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx@${PGRX_VERSION}

      - name: Initialize pgrx (pg17)
        if: steps.pgrx-pg.outputs.cache-hit != 'true'
        run: cargo pgrx init --pg17 download

      - name: Package the extension (edge version)
        id: pkg
        run: |
          set -euo pipefail
          BASE="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          COUNT="$(git rev-list --count HEAD)"
          SHA="$(git rev-parse --short HEAD)"
          EDGE_VERSION="${BASE}-dev.${COUNT}.g${SHA}"
          # pgrx stamps the version from Cargo.toml into the .control / .sql, so
          # rewrite it for this throwaway build (uncommitted, CI-local only).
          sed -i -E "0,/^version = .*/s//version = \"${EDGE_VERSION}\"/" Cargo.toml

          PGCONFIG="$(sed -n 's/^pg17 = "\(.*\)"/\1/p' ~/.pgrx/config.toml)"
          cargo pgrx package --no-default-features --features pg17 --pg-config "$PGCONFIG"

          SO="$(find target -name 'proxquery.so' -path '*release*' | head -1)"
          CONTROL="$(find target -name 'proxquery.control' -path '*release*' | head -1)"
          SQL="$(find target -name 'proxquery--*.sql' -path '*release*' | head -1)"

          STAGE="proxquery-${EDGE_VERSION}-pg17-linux-${{ matrix.arch }}"
          mkdir -p "$STAGE" dist
          cp "$SO" "$CONTROL" "$SQL" packaging/install.sh "$STAGE/"
          chmod +x "$STAGE/install.sh"
          tar -czf "dist/${STAGE}.tar.gz" "$STAGE"
          ( cd dist && sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256" )
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.pkg.outputs.stage }}
          path: dist/*
          if-no-files-found: error

  # Replace the single rolling `edge` pre-release (and its tag) with this commit's
  # artifacts. Done once, after both legs finish, to avoid the legs racing.
  publish:
    name: publish edge
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Re-publish the edge pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BASE="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          COUNT="$(git rev-list --count HEAD)"
          SHA="$(git rev-parse --short HEAD)"
          EDGE_VERSION="${BASE}-dev.${COUNT}.g${SHA}"
          # Delete the old rolling release + tag, then recreate at this commit.
          gh release delete edge --yes --cleanup-tag 2>/dev/null || true
          gh release create edge dist/* \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "edge (${EDGE_VERSION})" \
            --notes "Rolling pre-release built from the latest main commit (\`${SHA}\`).

          Fresh installs only — no upgrade-path guarantees, not for production.
          Download the tarball for your PG major + arch, extract, and run ./install.sh."
