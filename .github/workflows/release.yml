# Orchestrates everything that happens on a push to main (see docs/RELEASING.md).
#
# We detect whether THIS push landed a release by comparing Cargo.toml's version
# to the git tags — independent of how the Release PR was merged (squash, merge
# commit, or rebase all work). On a release commit we cut the v<x.y.z> tag +
# GitHub Release and build the artifacts (GHCR images + install tarballs); any
# other commit only refreshes the Release PR.

name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Keep the Release PR current on every push. Separate job so its (non-cancel)
  # concurrency group can't block or be blocked by the release job below.
  release-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    # git_only mode makes release-plz run `cargo package` (with a verify build)
    # to enumerate the crate's files. pgrx can't build without a Postgres/clang/
    # PGRX_HOME toolchain, so use pgrx's docs.rs mode: DOCS_RS=1 makes pgrx-pg-sys
    # skip bindgen and compile against its bundled bindings. This only affects
    # release-plz's internal bookkeeping build — the real artifacts are built by
    # release-build.yml, which deliberately does NOT set this.
    env:
      DOCS_RS: "1"
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate a token from the deployer GitHub App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ELEMENTAL_DEPLOYER_CLIENT_ID }}
          private-key: ${{ secrets.ELEMENTAL_DEPLOYER_APP_PK }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  # The gate. We no longer run release-plz's `release` command here — it tried to
  # `cargo publish`, which this unpublished cdylib extension can't do. Instead we
  # cut the release straight from Cargo.toml: merging the Release PR bumps the
  # version on `main`, and `released` is 'true' only on the push where that
  # version has no matching `v<x.y.z>` tag yet.
  release:
    name: tag + GitHub Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.gate.outputs.released }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          TAG="v${VERSION}"

          # Tag already exists → this push didn't bump the version (ordinary
          # commit). Nothing to release.
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "${TAG} already released; nothing to do."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # New version → cut the release, reusing the CHANGELOG section the
          # Release PR already wrote (git-cliff) as the notes; stub if absent.
          awk -v h="## [${VERSION}]" '
            index($0, h) == 1 { cap = 1; next }
            cap && index($0, "## [") == 1 { exit }
            cap { print }
          ' CHANGELOG.md > notes.md || true
          [ -s notes.md ] || printf 'Release %s\n' "$TAG" > notes.md

          # Point at the GHCR images (pushed by release-build.yml) without
          # touching the generated CHANGELOG — append a footer to the notes only.
          {
            printf '\n---\n'
            printf '**Container images:** `ghcr.io/%s:%s-pg16` · `-pg17` · `-pg18`\n' \
              "$GITHUB_REPOSITORY" "$VERSION"
          } >> notes.md

          gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --notes-file notes.md
          echo "Released ${TAG}."
          echo "released=true" >> "$GITHUB_OUTPUT"

  # Release commit: build the full PG 16/17/18 x amd64/arm64 matrix once, push the
  # GHCR images, and attach the install tarballs to the Release. Non-release
  # commits build nothing.
  build-release:
    name: build release
    needs: release
    if: ${{ needs.release.outputs.released == 'true' }}
    uses: ./.github/workflows/release-build.yml
    with:
      push_latest: true
    secrets: inherit
    # Caller is the ceiling for a reusable workflow's token: grant the GHCR push +
    # OIDC + attestation scopes here too, or the called build job's request is denied.
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
