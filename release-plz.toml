# release-plz config — drives only the Release PR (see docs/RELEASING.md).
#
# release-plz watches conventional-commit history on `main` and keeps a single
# "Release PR" open that bumps the version in Cargo.toml/Cargo.lock and writes
# CHANGELOG.md. Merging that PR is the deliberate, human gate. The tag + GitHub
# Release are then cut by release.yml's `release` job, NOT by release-plz — we
# don't run release-plz's `release` command, because it tries to `cargo publish`
# and this cdylib extension ships as binaries, not a crates.io crate.
#
# So `git_only` (below) is the one setting that matters here: it makes release-plz
# read the last version from git tags instead of crates.io (where this crate
# doesn't exist). Without it, release-plz can't compute bumps and stops opening
# Release PRs. (`publish = false` in Cargo.toml is kept only as a defensive
# marker that the crate is unpublishable; nothing in CI publishes it.)

[workspace]
# Read versions from git tags, not crates.io. Without this, release-plz queries
# crates.io for the "last release"; proxquery isn't published there, so it can't
# compute version bumps after the first tag and stops opening Release PRs.
git_only = true

# cargo-semver-checks diffs a crate's public API against its last crates.io
# release to pick the bump. There is no public Rust API here (it's a cdylib)
# and nothing on crates.io to diff against, so disable it — the bump comes
# purely from conventional commits.
semver_check = false

# Pre-1.0, release-plz defaults to feat -> patch (Cargo SemVer reserves 0.x
# minor bumps for breaking changes). We don't publish to crates.io, so that
# rule doesn't bind us: bump feat -> minor, as documented in docs/RELEASING.md.
# (Breaking changes already bump the minor pre-1.0 by default.)
features_always_increment_minor = true

# Tag + GitHub Release on merge of the Release PR. Tag format is the default
# `v{{ version }}`, which .github/workflows/release-build.yml keys off.
git_tag_enable = true
git_release_enable = true

# Give the Release PR a stable, readable title. Nothing keys off this anymore
# (the release/edge split uses release-plz's output, not the commit message) —
# it just keeps the title consistent regardless of single-crate vs. workspace.
pr_name = "chore: release v{{ version }}"

# How the CHANGELOG is rendered (release-plz embeds git-cliff). Keep entries to
# user-facing changes; skip tooling/noise and release-plz's own release commits
# (otherwise the previous release leaks into the next changelog's "Other").
[changelog]
# Never drop a breaking change, even if its type matches a skip rule below.
protect_breaking_commits = true
commit_parsers = [
    # User-facing — kept, under Keep-a-Changelog headings.
    { message = "^feat",   group = "added" },
    { message = "^fix",    group = "fixed" },
    { message = "^perf",   group = "performance" },
    { message = "^revert", group = "changed" },

    # Also kept, in their own sections.
    { message = "^docs",   group = "documentation" },
    { message = "^test",   group = "testing" },

    # Development noise — dropped.
    { message = "^refactor", skip = true },
    { message = "^style",    skip = true },
    { message = "^chore",    skip = true },   # incl. "chore: release vX.Y.Z"
    { message = "^ci",       skip = true },
    { message = "^build",    skip = true },

    # Anything else (non-conventional: "Update CHANGELOG", merge commits) — dropped.
    { message = "^.*",       skip = true },
]
